name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages --dev
      - name: Run ruff
        run: uv run ruff check .
      - name: Check formatting
        run: uv run black --check .

  test-common:
    name: Test kubex-common
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages --dev
      - name: Run unit tests
        run: uv run pytest libs/kubex-common -v --cov=kubex_common --cov-report=term-missing -m "not integration"
      - name: Check coverage
        run: uv run pytest libs/kubex-common --cov=kubex_common --cov-fail-under=90 -m "not integration" -q

  test-services:
    name: Test Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-packages --dev
      - name: Run service unit tests
        run: |
          uv run pytest services/gateway -v -m "not integration" || true
          uv run pytest services/broker -v -m "not integration" || true
          uv run pytest services/registry -v -m "not integration" || true
          uv run pytest services/kubex-manager -v -m "not integration" || true
