# docker-compose.dev.yml — Local development infrastructure
# Brings up data stores only. Services run locally via `uv run`.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   uv run --project services/gateway uvicorn gateway.main:app --reload

networks:
  kubex-dev:
    driver: bridge

volumes:
  redis-data-dev:
  neo4j-data-dev:
  opensearch-data-dev:

services:
  redis:
    image: redis:7-alpine
    container_name: kubexclaw-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
    networks:
      - kubex-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: kubexclaw-dev-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data-dev:/data
    environment:
      - NEO4J_AUTH=neo4j/devpassword
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - kubex-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  graphiti:
    image: zepai/graphiti:latest
    container_name: kubexclaw-dev-graphiti
    ports:
      - "8100:8100"
    environment:
      - OPENAI_API_KEY=dev-placeholder
      - OPENAI_BASE_URL=http://host.docker.internal:8080/v1
      - MODEL_NAME=claude-haiku-4-5
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=devpassword
    networks:
      - kubex-dev
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: kubexclaw-dev-opensearch
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data-dev:/usr/share/opensearch/data
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    networks:
      - kubex-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
