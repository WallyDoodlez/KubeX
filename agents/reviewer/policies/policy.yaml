agent_policy:
  actions:
    allowed:
      - "report_result"
    blocked:
      - "http_get"
      - "http_post"
      - "http_put"
      - "http_delete"
      - "execute_code"
      - "send_email"
      - "dispatch_task"
      - "write_output"
      - "read_input"
      - "query_knowledge"
      - "store_knowledge"
      - "search_corpus"
  egress:
    mode: "deny_all"
  models:
    allowed:
      - id: "o3-mini"
        provider: "openai"
  budget:
    per_task_token_limit: 20000
    daily_cost_limit_usd: 2.00
