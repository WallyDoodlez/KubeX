agent:
  id: "reviewer"
  description: >
    Security review specialist. Evaluates actions and content for policy
    compliance, prompt injection risks, and security concerns. Returns
    ALLOW, DENY, or ESCALATE verdicts with reasoning.
  model: "o3-mini"
  boundary: "default"
  harness_mode: "standalone"
  gateway_url: "http://gateway:8080"
  broker_url: "http://kubex-broker:8060"

  skills:
    - "review"

  capabilities:
    - "security_review"

  policy:
    allowed_actions:
      - "report_result"
    blocked_actions:
      - "http_get"
      - "http_post"
      - "http_put"
      - "http_delete"
      - "execute_code"
      - "send_email"
      - "dispatch_task"
      - "write_output"
      - "read_input"

  budget:
    per_task_token_limit: 20000
    daily_cost_limit_usd: 2.00
