agent:
  id: "orchestrator"
  model: "gpt-5.2"
  boundary: "default"
  harness_mode: "standalone"
  gateway_url: "http://gateway:8080"
  broker_url: "http://kubex-broker:8060"

  skills:
    - "task-management"

  capabilities:
    - "task_orchestration"
    - "task_management"

  policy:
    allowed_actions:
      - "dispatch_task"
      - "check_task_status"
      - "cancel_task"
      - "report_result"
      - "request_user_input"
      - "query_registry"
      - "query_knowledge"
      - "store_knowledge"
      - "search_corpus"
    blocked_actions:
      - "http_get"
      - "http_post"
      - "http_put"
      - "http_delete"
      - "execute_code"
      - "send_email"

  budget:
    per_task_token_limit: 50000
    daily_cost_limit_usd: 5.00
