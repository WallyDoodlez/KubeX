agent:
  id: "knowledge"
  model: "gpt-5.2"
  boundary: "default"
  harness_mode: "standalone"
  gateway_url: "http://gateway:8080"
  broker_url: "http://broker:8060"

  skills:
    - "recall"

  capabilities:
    - "knowledge_management"
    - "knowledge_query"
    - "knowledge_storage"

  policy:
    allowed_actions:
      - "query_knowledge"
      - "store_knowledge"
      - "search_corpus"
      - "report_result"
      - "progress_update"
    blocked_actions:
      - "http_get"
      - "http_post"
      - "execute_code"
      - "dispatch_task"
      - "send_email"

  budget:
    per_task_token_limit: 5000
    daily_cost_limit_usd: 2.00

  harness:
    progress_buffer_ms: 500
    progress_max_chunk_kb: 16
