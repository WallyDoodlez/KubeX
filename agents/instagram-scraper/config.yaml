agent:
  id: "instagram-scraper"
  description: >
    Social media data collection specialist. Scrapes Instagram profiles,
    posts, metrics, and trending content. Use for any task requiring
    social media data collection or analysis.
  model: "gpt-5.2"
  boundary: "default"
  harness_mode: "standalone"
  gateway_url: "http://gateway:8080"
  broker_url: "http://kubex-broker:8060"

  skills:
    - "web-scraping"

  capabilities:
    - "scrape_instagram"
    - "extract_metrics"

  policy:
    allowed_actions:
      - "http_get"
      - "write_output"
      - "report_result"
      - "progress_update"
      - "query_knowledge"
      - "store_knowledge"
      - "search_corpus"
    blocked_actions:
      - "http_post"
      - "http_put"
      - "http_delete"
      - "send_email"
      - "execute_code"
      - "dispatch_task"
    allowed_egress:
      - "instagram.com"
      - "i.instagram.com"
      - "graph.instagram.com"

  budget:
    per_task_token_limit: 10000
    daily_cost_limit_usd: 1.00

  harness:
    progress_buffer_ms: 500
    progress_max_chunk_kb: 16
