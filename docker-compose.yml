# docker-compose.yml — KubexClaw MVP
# Run './kubexclaw setup' before 'docker compose up -d' to configure credentials.

networks:
  kubex-internal:
    driver: bridge
    labels:
      # KMGR-05: Label enables dynamic network lookup by Kubex Manager
      kubex.network: internal
  kubex-external:
    driver: bridge

volumes:
  redis-data:
  knowledge-vault:

services:
  # ── Base image (build once, used by all agents) ──────────────────

  kubexclaw-base:
    build:
      context: .
      dockerfile: agents/_base/Dockerfile
    image: kubexclaw-base:latest

  # ── Infrastructure (always running) ─────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: kubexclaw-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./policies:/app/policies:ro
      - ./agents:/app/agents:ro
      - ./secrets/llm-api-keys.json:/app/secrets/llm-api-keys.json:ro
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - REGISTRY_URL=http://kubex-registry:8070
      - BROKER_URL=http://kubex-broker:8060
      - SERVICE_NAME=gateway
      - LLM_API_KEYS_PATH=/app/secrets/llm-api-keys.json
    networks:
      - kubex-internal
      - kubex-external
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-manager:
    build:
      context: .
      dockerfile: services/kubex-manager/Dockerfile
    container_name: kubexclaw-manager
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agents:/app/agents:ro
      - ./skills:/app/skills:ro
      - ./configs:/app/configs
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/3
      - REGISTRY_URL=http://kubex-registry:8070
      - GATEWAY_URL=http://gateway:8080
      - KUBEX_MGMT_TOKEN=${MANAGER_TOKEN}
      - KUBEX_DOCKER_NETWORK=openclaw_kubex-internal
      - SERVICE_NAME=kubex-manager
    networks:
      - kubex-internal
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-broker:
    build:
      context: .
      dockerfile: services/broker/Dockerfile
    container_name: kubexclaw-broker
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/0
      - SERVICE_NAME=kubex-broker
    networks:
      - kubex-internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-registry:
    build:
      context: .
      dockerfile: services/registry/Dockerfile
    container_name: kubexclaw-registry
    ports:
      - "8070:8070"
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/2
      - SERVICE_NAME=kubex-registry
    networks:
      - kubex-internal
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kubexclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
    networks:
      - kubex-internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Agents (kubexclaw-base image, specialized via skill mounts) ──

  orchestrator:
    image: kubexclaw-base:latest
    container_name: kubexclaw-orchestrator
    labels:
      kubex.agent_id: "orchestrator"
      kubex.boundary: "default"
    volumes:
      - ./agents/orchestrator/config.yaml:/app/config.yaml:ro
      - ./agents/orchestrator/policies:/app/policies:ro
      - ./skills/orchestration/task-management:/app/skills/task-management:ro
      - knowledge-vault:/app/vault
    environment:
      - ANTHROPIC_BASE_URL=http://gateway:8080/v1/proxy/anthropic
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - REGISTRY_URL=http://kubex-registry:8070
      - VAULT_PATH=/app/vault
    networks:
      - kubex-internal
    depends_on:
      kubexclaw-base:
        condition: service_started
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
    restart: unless-stopped

  instagram-scraper:
    image: kubexclaw-base:latest
    container_name: kubexclaw-instagram-scraper
    labels:
      kubex.agent_id: "instagram-scraper"
      kubex.boundary: "default"
    volumes:
      - ./agents/instagram-scraper/config.yaml:/app/config.yaml:ro
      - ./agents/instagram-scraper/policies:/app/policies:ro
      - ./skills/data-collection/web-scraping:/app/skills/web-scraping:ro
    environment:
      - ANTHROPIC_BASE_URL=http://gateway:8080/v1/proxy/anthropic
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - REGISTRY_URL=http://kubex-registry:8070
    networks:
      - kubex-internal
      - kubex-external
    depends_on:
      kubexclaw-base:
        condition: service_started
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  knowledge:
    image: kubexclaw-base:latest
    container_name: kubexclaw-knowledge
    labels:
      kubex.agent_id: "knowledge"
      kubex.boundary: "default"
    volumes:
      - ./agents/knowledge/config.yaml:/app/config.yaml:ro
      - ./agents/knowledge/policies:/app/policies:ro
      - ./skills/knowledge/obsidian-vault:/app/skills/obsidian-vault:ro
      - knowledge-vault:/app/vault
    environment:
      - ANTHROPIC_BASE_URL=http://gateway:8080/v1/proxy/anthropic
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - REGISTRY_URL=http://kubex-registry:8070
      - VAULT_PATH=/app/vault
    networks:
      - kubex-internal
    depends_on:
      kubexclaw-base:
        condition: service_started
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    restart: unless-stopped

  reviewer:
    image: kubexclaw-base:latest
    container_name: kubexclaw-reviewer
    labels:
      kubex.agent_id: "reviewer"
      kubex.boundary: "default"
    volumes:
      - ./agents/reviewer/config.yaml:/app/config.yaml:ro
      - ./agents/reviewer/policies:/app/policies:ro
      - ./skills/security/review:/app/skills/review:ro
    environment:
      - ANTHROPIC_BASE_URL=http://gateway:8080/v1/proxy/anthropic
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - REGISTRY_URL=http://kubex-registry:8070
    networks:
      - kubex-internal
    depends_on:
      kubexclaw-base:
        condition: service_started
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    restart: unless-stopped

  # ── Command Center (web admin dashboard) ─────────────────────────

  command-center:
    build:
      context: ./command-center
      dockerfile: Dockerfile
      args:
        - VITE_GATEWAY_URL=http://localhost:8080
        - VITE_REGISTRY_URL=http://localhost:8070
        - VITE_MANAGER_URL=http://localhost:8090
        - VITE_MANAGER_TOKEN=${MANAGER_TOKEN:-changeme-manager-token}
    container_name: kubexclaw-command-center
    ports:
      - "3001:3000"
    networks:
      - kubex-external
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
