# docker-compose.yml — KubexClaw MVP
# Run './kubexclaw setup' before 'docker compose up -d' to configure credentials.

networks:
  kubex-internal:
    driver: bridge
  kubex-external:
    driver: bridge
  kubex-data:
    driver: bridge

volumes:
  redis-data:
  neo4j-data:
  opensearch-data:

services:
  # ── Infrastructure (always running) ─────────────────────────────

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: kubexclaw-gateway
    ports:
      - "8080:8080"
    volumes:
      - ./policies:/app/policies:ro
      - ./agents:/app/agents:ro
      - ./secrets/llm-api-keys.json:/app/secrets/llm-api-keys.json:ro
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379
      - REGISTRY_URL=http://kubex-registry:8070
      - SERVICE_NAME=gateway
      - LLM_API_KEYS_PATH=/app/secrets/llm-api-keys.json
    networks:
      - kubex-internal
      - kubex-external
      - kubex-data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-manager:
    build:
      context: .
      dockerfile: services/kubex-manager/Dockerfile
    container_name: kubexclaw-manager
    ports:
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./agents:/app/agents:ro
      - ./skills:/app/skills:ro
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/3
      - REGISTRY_URL=http://kubex-registry:8070
      - GATEWAY_URL=http://gateway:8080
      - MANAGER_TOKEN=${MANAGER_TOKEN}
      - SERVICE_NAME=kubex-manager
    networks:
      - kubex-internal
      - kubex-data
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-broker:
    build:
      context: .
      dockerfile: services/broker/Dockerfile
    container_name: kubexclaw-broker
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/0
      - SERVICE_NAME=kubex-broker
    networks:
      - kubex-internal
      - kubex-data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kubex-registry:
    build:
      context: .
      dockerfile: services/registry/Dockerfile
    container_name: kubexclaw-registry
    ports:
      - "8070:8070"
    environment:
      - REDIS_URL=redis://default:${REDIS_PASSWORD}@redis:6379/2
      - SERVICE_NAME=kubex-registry
    networks:
      - kubex-internal
      - kubex-data
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kubexclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
    networks:
      - kubex-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Knowledge Base ──────────────────────────────────────────────

  neo4j:
    image: neo4j:5-community
    container_name: kubexclaw-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - kubex-data
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  graphiti:
    image: zepai/graphiti:latest
    container_name: kubexclaw-graphiti
    ports:
      - "8100:8100"
    environment:
      - OPENAI_API_KEY=placeholder
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - MODEL_NAME=${DEFAULT_LLM_MODEL}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    networks:
      - kubex-data
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    container_name: kubexclaw-opensearch
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms1536m -Xmx1536m
    networks:
      - kubex-data
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Orchestrator (always running) ────────────────────────────────

  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    container_name: kubexclaw-orchestrator
    labels:
      kubex.agent_id: "orchestrator"
      kubex.boundary: "default"
    volumes:
      - ./agents/orchestrator/config.yaml:/app/config.yaml:ro
      - ./agents/orchestrator/policies:/app/policies:ro
    environment:
      - ANTHROPIC_BASE_URL=http://gateway:8080/v1/proxy/anthropic
      - OPENAI_BASE_URL=http://gateway:8080/v1/proxy/openai
      - GATEWAY_URL=http://gateway:8080
    networks:
      - kubex-internal
    depends_on:
      gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '1.0'
    # Orchestrator idles until triggered via docker exec. It's a long-running
    # container that hosts the MCP bridge; work starts when a user attaches
    # an interactive OpenClaw session (e.g. docker exec -it orchestrator claude).
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
